<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Nathan Mora</title>
                <style>
                    * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                    }
                    
                    body {
                        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                        background: #fff;
                        color: #000;
                        overflow: hidden;
                        height: 100vh;
                    }
                    
                    .header {
                        position: fixed;
                        top: 0;
                        left: 0;
                        right: 0;
                        padding: 30px 60px;
                        display: flex;
                        justify-content: space-between;
                        align-items: flex-end;
                        z-index: 50;
                        background: rgba(255, 255, 255, 0.95);
                        backdrop-filter: blur(10px);
                    }
                    
                    .logo {
                        font-size: 40px;
                        font-weight: 500;
                    }
                    
                    .project-name {
                        font-size: 20px;
                        font-weight: 400;
                        color: #999;
                        margin-top: 8px;
                        transition: opacity 0.3s ease;
                        opacity: 0;
                        height: 20px;
                    }
                    
                    .project-name.visible {
                        opacity: 1;
                    }
                    
                    .nav {
                        display: flex;
                        flex-direction: column;
                        gap: 20px;
                        margin-top: 60px;
                        margin-right: 120px;
                    }
                    
                    .nav a {
                        color: #00000066;
                        text-decoration: none;
                        font-size: 14px;
                        ont-weight: 100;
                        transition: color 0.3s;
                        text-align: right;
                    }
                    
                    .nav a:hover {
                        color: #000;
                    }
                    
                    .scroll-container {
                        display: flex;
                        height: 100vh;
                        overflow-x: scroll;
                        overflow-y: hidden;
                        scroll-snap-type: x proximity;
                        scroll-behavior: auto;
                        padding-top: 90px;
                        -webkit-overflow-scrolling: touch;
                    }
                    
                    .scroll-container::-webkit-scrollbar {
                        height: 10px;
                    }
                    
                    .scroll-container::-webkit-scrollbar-track {
                        background: #f5f5f5;
                    }
                    
                    .scroll-container::-webkit-scrollbar-thumb {
                        background: #ddd;
                        border-radius: 5px;
                    }
                    
                    .scroll-container::-webkit-scrollbar-thumb:hover {
                        background: #ccc;
                    }
                    
                    .project-slide {
                        min-width: 600px;
                        max-width: 600px;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        padding: 0 80px;
                        scroll-snap-align: start;
                        cursor: pointer;
                        transition: all 0.3s ease;
                        position: relative;
                    }
                    
                    .project-slide-image {
                        width: 100%;
                        max-width: 400px;
                        height: 250px;
                        object-fit: cover;
                        border-radius: 8px;
                        margin-bottom: 30px;
                        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
                        transition: all 0.3s ease;
                    }
                    
                    .project-slide:hover .project-slide-image {
                        transform: scale(1.02);
                        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
                    }
                    
                    .project-slide::before {
                        content: '';
                        position: absolute;
                        left: 0;
                        top: 20%;
                        bottom: 20%;
                        width: 3px;
                        background: transparent;
                        transition: background 0.3s;
                    }
                    
                    .project-slide:hover::before {
                        background: linear-gradient(to bottom, transparent, #000, transparent);
                    }
                    
                    .project-slide:hover {
                        transform: scale(1.05);
                    }
                    
                    .project-title {
                        font-size: 48px;
                        font-weight: 300;
                        margin-bottom: 15px;
                        letter-spacing: -1px;
                    }
                    
                    .project-role {
                        font-size: 16px;
                        color: #666;
                        margin-bottom: 8px;
                    }
                    
                    .project-company {
                        font-size: 14px;
                        color: #999;
                        margin-bottom: 30px;
                    }
                    
                    .project-year {
                        font-size: 13px;
                        color: #ccc;
                    }
                    
                    /* Modal Overlay */
                    .modal-overlay {
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        background: rgba(255, 255, 255, 0.98);
                        backdrop-filter: blur(30px);
                        z-index: 100;
                        display: none;
                        opacity: 0;
                        transition: opacity 0.5s ease;
                    }
                    
                    .modal-overlay.active {
                        display: block;
                        opacity: 1;
                    }
                    
                    .modal-close {
                        position: fixed;
                        top: 40px;
                        right: 60px;
                        font-size: 40px;
                        color: #000;
                        cursor: pointer;
                        z-index: 110;
                        width: 50px;
                        height: 50px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        transition: transform 0.3s;
                    }
                    
                    .modal-close:hover {
                        transform: rotate(90deg);
                    }
                    
                    .modal-content {
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        display: flex;
                        overflow-x: scroll;
                        overflow-y: hidden;
                        scroll-snap-type: x proximity;
                        scroll-behavior: auto;
                        -webkit-overflow-scrolling: touch;
                    }
                    
                    .modal-content::-webkit-scrollbar {
                        height: 8px;
                    }
                    
                    .modal-content::-webkit-scrollbar-track {
                        background: rgba(0, 0, 0, 0.05);
                    }
                    
                    .modal-content::-webkit-scrollbar-thumb {
                        background: rgba(0, 0, 0, 0.2);
                        border-radius: 4px;
                    }
                    
                    .modal-slide {
                        min-width: 100%;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                        scroll-snap-align: center;
                        padding: 100px 60px;
                        text-align: center;
                    }
                    
                    .modal-slide h2 {
                        font-size: 72px;
                        font-weight: 300;
                        margin-bottom: 25px;
                        letter-spacing: -2px;
                    }
                    
                    .modal-slide .role {
                        font-size: 22px;
                        color: #666;
                        margin-bottom: 12px;
                    }
                    
                    .modal-slide .company {
                        font-size: 18px;
                        color: #999;
                        margin-bottom: 40px;
                    }
                    
                    .project-image {
                        width: 100%;
                        max-width: 800px;
                        height: auto;
                        border-radius: 12px;
                        margin-bottom: 60px;
                        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
                    }
                    
                    .team-label {
                        font-size: 12px;
                        color: #999;
                        text-transform: uppercase;
                        letter-spacing: 2px;
                        margin-bottom: 30px;
                    }
                    
                    .team-grid {
                        display: flex;
                        flex-wrap: wrap;
                        gap: 15px;
                        justify-content: center;
                        max-width: 700px;
                    }
                    
                    .team-member {
                        font-size: 14px;
                        color: #333;
                        padding: 10px 20px;
                        background: rgba(0, 0, 0, 0.03);
                        border: 1px solid rgba(0, 0, 0, 0.1);
                        border-radius: 25px;
                        transition: all 0.3s;
                    }
                    
                    .team-member:hover {
                        background: rgba(0, 0, 0, 0.08);
                        border-color: rgba(0, 0, 0, 0.2);
                    }
                    
                    @media (max-width: 768px) {
                        .header {
                            padding: 20px;
                        }
                        
                        .nav {
                            margin-top: 20px;
                            gap: 15px;
                        }
                        
                        .project-slide {
                            min-width: 90vw;
                            max-width: 90vw;
                            padding: 0 40px;
                        }
                        
                        .project-title {
                            font-size: 32px;
                        }
                        
                        .modal-slide h2 {
                            font-size: 42px;
                        }
                    }
                </style>
    </head>
    <body>
        <header class="header">
            <div>

        <div class="scroll-container" id="scrollContainer">
            
            <div class="project-slide" onclick="openModal(0)">

            <div class="project-slide" onclick="openModal(1)">

            <div class="project-slide" onclick="openModal(2)">

                <img src="https://images.unsplash.com/photo-1558002038-1055907df827?w=800&q=80" alt="Nest" class="project-slide-image">

            <div class="project-slide" onclick="openModal(4)">
                <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=800&q=80" alt="Push Pop Press" class="project-slide-image">
                    <!--

            <div class="project-slide" onclick="openModal(5)">
                <img src="https://images.unsplash.com/photo-1611532736579-6b16e2b50449?w=800&q=80" alt="iPad Photos" class="project-slide-image">
                    <!--
                    
                    <h2 class="project-title">iPad Photos</h2>

            </div>
            
            <div class="project-slide" onclick="openModal(6)">
                <img src="https://images.unsplash.com/photo-1569336415962-a4bd9f69cd83?w=800&q=80" alt="iPhone Maps" class="project-slide-image">
                    <!--
                    
                    <h2 class="project-title">iPhone Maps</h2>
                    <div class="project-role">Interface Design</div>
                    <div class="project-company">Apple</div>
                    <div class="project-year">2007</div>
                    
                    -->
            </div>
            
            <div class="project-slide" onclick="openModal(7)">
                <img src="https://images.unsplash.com/photo-1551033406-611cf9a28f67?w=800&q=80" alt="Time Machine" class="project-slide-image">
                    <!--
                    
                    <h2 class="project-title">Time Machine</h2>
                    <div class="project-role">Interface Design</div>
                    <div class="project-company">Apple</div>
                    <div class="project-year">2006</div>
                    
                    -->
            </div>
            
            <div class="project-slide" onclick="openModal(8)">
                <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=800&q=80" alt="Delicious Library" class="project-slide-image">
                    <!--
                    
                    <h2 class="project-title">Delicious Library</h2>
                    <div class="project-role">Founder</div>
                    <div class="project-company">Delicious Monster</div>
                    <div class="project-year">2004</div>
                    
                    -->
            </div>
            
        </div>
        
        <!-- Modal -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-close" onclick="closeModal()">&times;</div>
            <div class="modal-content" id="modalContent"></div>
        </div>
        
        <script>
            const projects = [
                              {
                                  title: "Lobe",
                                  role: "Founder",
                                  company: "Acquired by Microsoft · 2020",
                                  image: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800&q=80",
                                  team: ["Kevin Scott", "Bill Barnes", "Jake Cohen", "Adam Menges", "Markus Beissinger", "Zach Stiggelbout", "Ramon Gilabert", "Mike Matas"]
                              },
                              {
                                  title: "Instant Articles",
                                  role: "Interface Design",
                                  company: "Facebook · 2015",
                                  image: "https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=800&q=80",
                                  team: ["Mark Zuckerberg", "Chris Cox", "Michael Reckhow", "Ben Langholz", "Sharon Matas", "Mike Matas"]
                              },
                              {
                                  title: "Paper",
                                  role: "Interface Design",
                                  company: "Facebook · 2015",
                                  image: "https://images.unsplash.com/photo-1586281380349-632531db7ed4?w=800&q=80",
                                  team: ["Mark Zuckerberg", "Chris Cox", "Michael Reckhow", "Brandon Walkin", "Joey Flynn", "Ben Langholz", "Sharon Matas", "Mike Matas"]
                              },
                              {
                                  title: "Nest",
                                  role: "Interface Design",
                                  company: "Acquired by Google · 2014",
                                  image: "https://images.unsplash.com/photo-1558002038-1055907df827?w=800&q=80",
                                  team: ["Tony Fadell", "David Sloo", "Fred Bould", "Tom Crabtree", "Mike Matas"]
                              },
                              {
                                  title: "Push Pop Press",
                                  role: "Founder",
                                  company: "Acquired by Facebook · 2011",
                                  image: "https://images.unsplash.com/photo-1512820790803-83ca734da794?w=800&q=80",
                                  team: ["Al Gore", "Charlie Melcher", "Duncan Bock", "Kimon Tsinteris", "Austin Sarner", "Bret Victor", "Mike Matas"]
                              },
                              {
                                  title: "iPad Photos",
                                  role: "Interface Design",
                                  company: "Apple · 2010",
                                  image: "https://images.unsplash.com/photo-1611532736579-6b16e2b50449?w=800&q=80",
                                  team: ["Steve Jobs", "Scott Forstall", "Greg Christie", "Bas Ording", "Imran Chaudhri", "Steve Lemay", "Marcell Van Os", "Freddy Anzures", "Mike Matas"]
                              },
                              {
                                  title: "iPhone Maps",
                                  role: "Interface Design",
                                  company: "Apple · 2007",
                                  image: "https://images.unsplash.com/photo-1569336415962-a4bd9f69cd83?w=800&q=80",
                                  team: ["Steve Jobs", "Scott Forstall", "Greg Christie", "Bas Ording", "Imran Chaudhri", "Steve Lemay", "Marcell Van Os", "Freddy Anzures", "Mike Matas"]
                              },
                              {
                                  title: "Time Machine",
                                  role: "Interface Design",
                                  company: "Apple · 2006",
                                  image: "https://images.unsplash.com/photo-1551033406-611cf9a28f67?w=800&q=80",
                                  team: ["Steve Jobs", "Scott Forstall", "Greg Christie", "Bas Ording", "Imran Chaudhri", "Marcell Van Os", "Mike Matas"]
                              },
                              {
                                  title: "Delicious Library",
                                  role: "Founder",
                                  company: "Delicious Monster · 2004",
                                  image: "https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=800&q=80",
                                  team: ["Wil Shipley", "Tim Omernick", "Drew Hamlin", "Scott Maier", "Jeff Rooney", "Mike Matas"]
                              }
                              ];
                              
                              let currentSlide = 0;
                              const modalContent = document.getElementById('modalContent');
                              const modalOverlay = document.getElementById('modalOverlay');
                              const scrollContainer = document.getElementById('scrollContainer');
                              const projectName = document.getElementById('projectName');
                              
                              // Función para actualizar el nombre del proyecto según el scroll
                              function updateLogo() {
                                  const scrollLeft = scrollContainer.scrollLeft;
                                  const containerWidth = scrollContainer.offsetWidth;
                                  const scrollWidth = scrollContainer.scrollWidth;
                                  const slides = document.querySelectorAll('.project-slide');
                                  
                                  let currentIndex = 0;
                                  let minDistance = Infinity;
                                  
                                  // Encontrar el slide más cercano al centro de la pantalla
                                  slides.forEach((slide, index) => {
                                      const slideLeft = slide.offsetLeft;
                                      const slideCenter = slideLeft + (slide.offsetWidth / 2);
                                      const viewportCenter = scrollLeft + (containerWidth / 2);
                                      const distance = Math.abs(slideCenter - viewportCenter);
                                      
                                      if (distance < minDistance) {
                                          minDistance = distance;
                                          currentIndex = index;
                                      }
                                  });
                                  
                                  if (currentIndex >= 0 && currentIndex < projects.length) {
                                      projectName.classList.remove('visible');
                                      setTimeout(() => {
                                          projectName.textContent = projects[currentIndex].title;
                                          projectName.classList.add('visible');
                                      }, 150);
                                  } else {
                                      projectName.classList.remove('visible');
                                      setTimeout(() => {
                                          projectName.textContent = '';
                                      }, 300);
                                  }
                              }
            
            // Escuchar el evento de scroll
            scrollContainer.addEventListener('scroll', updateLogo);
            
            function createSlides() {
                projects.forEach((project, index) => {
                    const slide = document.createElement('div');
                    slide.className = 'modal-slide';
                    slide.innerHTML = `
                        <h2>${project.title}</h2>
                        <div class="role">${project.role}</div>
                        <div class="company">${project.company}</div>
                        <img src="${project.image}" alt="${project.title}" class="project-image">
                        <div class="team-label">Team</div>
                        <div class="team-grid">
                        ${project.team.map(member => `<span class="team-member">${member}</span>`).join('')}
                    </div>
                `;
                modalContent.appendChild(slide);
                });
            }
            
            function openModal(index) {
                currentSlide = index;
                modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                modalContent.scrollLeft = index * window.innerWidth;
            }
            
            function closeModal() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = 'hidden';
            }
            
            function nextSlide(event) {
                event.stopPropagation();
                if (currentSlide < projects.length - 1) {
                    currentSlide++;
                    modalContent.scrollLeft = currentSlide * window.innerWidth;
                }
            }
            
            function prevSlide(event) {
                event.stopPropagation();
                if (currentSlide > 0) {
                    currentSlide--;
                    modalContent.scrollLeft = currentSlide * window.innerWidth;
                }
            }
            
            document.addEventListener('keydown', (e) => {
                if (modalOverlay.classList.contains('active')) {
                    if (e.key === 'Escape') {
                        closeModal();
                    } else if (e.key === 'ArrowRight') {
                        nextSlide(e);
                    } else if (e.key === 'ArrowLeft') {
                        prevSlide(e);
                    }
                }
            });
            
            modalContent.addEventListener('scroll', () => {
                currentSlide = Math.round(modalContent.scrollLeft / window.innerWidth);
            });
            
            createSlides();
            
            // Llamar updateLogo al cargar la página
            updateLogo();
        </script>
    </body>
</html>

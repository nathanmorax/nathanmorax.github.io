<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nathan Mora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #000;
            overflow: hidden;
            height: 100vh;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 50;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            font-size: 40px;
            font-weight: 500;
        }
        
        .project-name {
            font-size: 20px;
            font-weight: 400;
            color: #999;
            margin-top: 8px;
            transition: opacity 0.3s ease;
            opacity: 0;
            min-height: 28px;
        }
        
        .project-name.visible {
            opacity: 1;
        }
        
        .nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 60px;
            margin-right: 120px;
        }
        
        .nav a {
            color: #00000066;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
            text-align: right;
        }
        
        .nav a:hover {
            color: #000;
        }
        
        .scroll-container {
            display: flex;
            height: 100vh;
            overflow-x: scroll;
            overflow-y: hidden;
            scroll-snap-type: x proximity;
            scroll-behavior: auto;
            padding-top: 90px;
            -webkit-overflow-scrolling: touch;
        }
        
        .scroll-container::-webkit-scrollbar {
            height: 10px;
        }
        
        .scroll-container::-webkit-scrollbar-track {
            background: #f5f5f5;
        }
        
        .scroll-container::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 5px;
        }
        
        .scroll-container::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }
        
        .project-slide {
            min-width: 800px;
            max-width: 800px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 80px;
            scroll-snap-align: start;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .project-slide-image {
            width: 200%;
            max-width: 700px;
            height: 550px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.4s ease;
        }
        
        .project-slide:hover .project-slide-image {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        
        .project-slide.clicking .project-slide-image {
            transform: scale(1.1);
            opacity: 0.8;
        }
        
        .project-slide:hover {
            transform: scale(1.03);
        }
        
        .project-title {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }
        
        .project-role {
            font-size: 16px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .project-company {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
        }
        
        .project-year {
            font-size: 13px;
            color: #ccc;
        }
        
        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0);
            backdrop-filter: blur(0px);
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, background 0.4s ease, backdrop-filter 0.4s ease, visibility 0s 0.4s;
        }
        
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(30px);
            transition: opacity 0.4s ease, background 0.4s ease, backdrop-filter 0.4s ease, visibility 0s 0s;
        }
        
        .modal-close {
            position: fixed;
            top: 40px;
            right: 60px;
            font-size: 40px;
            color: #000;
            cursor: pointer;
            z-index: 110;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }
        
        .modal-close:hover {
            transform: rotate(90deg);
        }
        
        .modal-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            overflow-x: scroll;
            overflow-y: hidden;
            scroll-snap-type: x proximity;
            scroll-behavior: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .modal-content::-webkit-scrollbar {
            height: 8px;
        }
        
        .modal-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }
        
        .modal-content::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        
        .modal-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: center;
            padding: 100px 60px;
            text-align: center;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
        }
        
        .modal-overlay.active .modal-slide {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        
        .modal-slide h2 {
            font-size: 72px;
            font-weight: 300;
            margin-bottom: 25px;
            letter-spacing: -2px;
        }
        
        .modal-slide .role {
            font-size: 22px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .modal-slide .company {
            font-size: 18px;
            color: #999;
            margin-bottom: 40px;
        }
        
        .project-image {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 60px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .team-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        
        .team-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            max-width: 700px;
        }
        
        .team-member {
            font-size: 14px;
            color: #333;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 25px;
            transition: all 0.3s;
        }
        
        .team-member:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.2);
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }
            
            .nav {
                margin-top: 20px;
                gap: 15px;
            }
            
            .project-slide {
                min-width: 90vw;
                max-width: 90vw;
                padding: 0 40px;
            }
            
            .project-title {
                font-size: 32px;
            }
            
            .modal-slide h2 {
                font-size: 42px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div>
            <div class="logo">Nathan Mora</div>
            <div class="project-name" id="projectName"></div>
        </div>
        <nav class="nav">
            <a href="#about">Quién soy</a>
            <a href="#twitter">LinkedIn</a>
            <a href="#instagram">Correo</a>
        </nav>
    </header>
    
    <div class="scroll-container" id="scrollContainer"></div>
    
    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-close" onclick="closeModal()">&times;</div>
        <div class="modal-content" id="modalContent"></div>
    </div>
    
    <script>
        const projects = [
            {
                title: "Lobe",
                role: "Founder",
                company: "Acquired by Microsoft",
                year: "2020",
                image: "images/App1.png",
                team: ["Kevin Scott", "Bill Barnes", "Jake Cohen", "Adam Menges", "Markus Beissinger", "Zach Stiggelbout", "Ramon Gilabert", "Mike Matas"]
            },
            {
                title: "Instant Articles",
                role: "Interface Design",
                company: "Facebook",
                year: "2015",
                image: "images/App1.png",
                team: ["Mark Zuckerberg", "Chris Cox", "Michael Reckhow", "Ben Langholz", "Sharon Matas", "Mike Matas"]
            },
            {
                title: "Paper",
                role: "Interface Design",
                company: "Facebook",
                year: "2015",
                image: "images/App1.png",
                team: ["Mark Zuckerberg", "Chris Cox", "Michael Reckhow", "Brandon Walkin", "Joey Flynn", "Ben Langholz", "Sharon Matas", "Mike Matas"]
            },
            {
                title: "Nest",
                role: "Interface Design",
                company: "Acquired by Google",
                year: "2014",
                image: "images/App1.png",
                team: ["Tony Fadell", "David Sloo", "Fred Bould", "Tom Crabtree", "Mike Matas"]
            },
            {
                title: "Push Pop Press",
                role: "Founder",
                company: "Acquired by Facebook",
                year: "2011",
                image: "images/App1.png",
                team: ["Al Gore", "Charlie Melcher", "Duncan Bock", "Kimon Tsinteris", "Austin Sarner", "Bret Victor", "Mike Matas"]
            },
            {
                title: "iPad Photos",
                role: "Interface Design",
                company: "Apple",
                year: "2010",
                image: "images/App1.png",
                team: ["Steve Jobs", "Scott Forstall", "Greg Christie", "Bas Ording", "Imran Chaudhri", "Steve Lemay", "Marcell Van Os", "Freddy Anzures", "Mike Matas"]
            },
            {
                title: "iPhone Maps",
                role: "Interface Design",
                company: "Apple",
                year: "2007",
                image: "images/App1.png",
                team: ["Steve Jobs", "Scott Forstall", "Greg Christie", "Bas Ording", "Imran Chaudhri", "Steve Lemay", "Marcell Van Os", "Freddy Anzures", "Mike Matas"]
            },
            {
                title: "Time Machine",
                role: "Interface Design",
                company: "Apple",
                year: "2006",
                image: "images/App1.png",
                team: ["Steve Jobs", "Scott Forstall", "Greg Christie", "Bas Ording", "Imran Chaudhri", "Marcell Van Os", "Mike Matas"]
            },
            {
                title: "Delicious Library",
                role: "Founder",
                company: "Delicious Monster",
                year: "2004",
                image: "images/App1.png",
                team: ["Wil Shipley", "Tim Omernick", "Drew Hamlin", "Scott Maier", "Jeff Rooney", "Mike Matas"]
            }
        ];
        
        let currentSlide = 0;
        const modalContent = document.getElementById('modalContent');
        const modalOverlay = document.getElementById('modalOverlay');
        const scrollContainer = document.getElementById('scrollContainer');
        const projectName = document.getElementById('projectName');
        
        // Crear slides del home
        function createHomeSlides() {
            projects.forEach((project, index) => {
                const slide = document.createElement('div');
                slide.className = 'project-slide';
                slide.onclick = (e) => {
                    slide.classList.add('clicking');
                    setTimeout(() => {
                        openModal(index);
                        setTimeout(() => {
                            slide.classList.remove('clicking');
                        }, 400);
                    }, 150);
                };
                slide.innerHTML = `
                    <img src="${project.image}" alt="${project.title}" class="project-slide-image">
                `;
                scrollContainer.appendChild(slide);
            });
        }
        
        // Función para actualizar el nombre del proyecto según el scroll
        function updateLogo() {
            const scrollLeft = scrollContainer.scrollLeft;
            const slides = document.querySelectorAll('.project-slide');
            
            let currentIndex = 0;
            
            // Encontrar qué slide está al inicio del viewport (más a la izquierda visible)
            slides.forEach((slide, index) => {
                const slideLeft = slide.offsetLeft;
                const slideRight = slideLeft + slide.offsetWidth;
                
                // Si el borde izquierdo del slide está dentro del viewport o antes
                if (slideLeft <= scrollLeft + 100) {
                    currentIndex = index;
                }
            });
            
            if (currentIndex >= 0 && currentIndex < projects.length) {
                const newTitle = projects[currentIndex].title;
                if (projectName.textContent !== newTitle) {
                    projectName.classList.remove('visible');
                    setTimeout(() => {
                        projectName.textContent = newTitle;
                        projectName.classList.add('visible');
                    }, 150);
                }
            }
        }
        
        // Escuchar el evento de scroll
        scrollContainer.addEventListener('scroll', updateLogo);
        
        // Crear slides del modal
        function createModalSlides() {
            projects.forEach((project, index) => {
                const slide = document.createElement('div');
                slide.className = 'modal-slide';
                slide.innerHTML = `
                    <h2>${project.title}</h2>
                    <div class="role">${project.role}</div>
                    <div class="company">${project.company} · ${project.year}</div>
                    <img src="${project.image}" alt="${project.title}" class="project-image">
                    <div class="team-label">Team</div>
                    <div class="team-grid">
                        ${project.team.map(member => `<span class="team-member">${member}</span>`).join('')}
                    </div>
                `;
                modalContent.appendChild(slide);
            });
        }
        
        function openModal(index) {
            currentSlide = index;
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            modalContent.scrollLeft = index * window.innerWidth;
        }
        
        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = 'hidden';
        }
        
        document.addEventListener('keydown', (e) => {
            if (modalOverlay.classList.contains('active')) {
                if (e.key === 'Escape') {
                    closeModal();
                } else if (e.key === 'ArrowRight' && currentSlide < projects.length - 1) {
                    currentSlide++;
                    modalContent.scrollLeft = currentSlide * window.innerWidth;
                } else if (e.key === 'ArrowLeft' && currentSlide > 0) {
                    currentSlide--;
                    modalContent.scrollLeft = currentSlide * window.innerWidth;
                }
            }
        });
        
        modalContent.addEventListener('scroll', () => {
            currentSlide = Math.round(modalContent.scrollLeft / window.innerWidth);
        });
        
        // Inicializar
        createHomeSlides();
        createModalSlides();
        updateLogo();
    </script>
</body>
</html>
